<div class="header-area">
  <ng-content select="[appExpanderHeader]"></ng-content>
</div>
<div class="toggle-area">
  @if (hasCustomToggle()) {
    <ng-content select="[appExpanderToggle]"></ng-content>
  } @else {
    <app-atomic-button color="primary" variant="text" (click)="toggle()">
      <span label>
        @if (isExpanded()) {
          Less
        } @else {
          More
        }
      </span>
    </app-atomic-button>
  }
</div>
@if (isExpanded()) {
  <div class="content-area" animate.leave="leaves" animate.enter="enters">
    <ng-content />
  </div>
}
